name: New Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check for EXPO_TOKEN
        run: >
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi


      - uses: actions/checkout@v6

      - name: Setup jq
        uses: dcarbone/install-jq-action@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: ./.github/actions/setup-node-pnpm-install

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm

      - name: Setup EAS local builds
        run: pnpm install -g eas-cli-local-build-plugin

      - name: Extract Version from package.json
        id: extract_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build AAB
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: eas build --platform android --profile production-store --local --output build.aab --non-interactive

      # - name: Submit to Play Store
      #   run: eas submit --platform android --path build.aab --profile production --non-interactive

      - name: Clear Metro cache
        run: rm -rf ${TMPDIR:-/tmp}/metro-cache

      - name: Build APK
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: eas build --platform android --profile production-apk --local --output cron-v${{ env.APP_VERSION }}.apk --non-interactive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cron-v${{ env.APP_VERSION }}.apk
          generate_release_notes: true
